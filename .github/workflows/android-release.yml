name: Build Android Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android-release:
    name: Build Signed Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Google Services JSON Configuration
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "[CI] Decoding GOOGLE_SERVICES_JSON_BASE64 secret..."
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
          elif [ ! -f "android/app/google-services.json" ]; then
            echo "[CI] WARNING: google-services.json not found. Creating placeholder..."
            cat << 'EOF' > android/app/google-services.json
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "fitrack-app",
              "storage_bucket": "fitrack-app.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890abcdef",
                  "android_client_info": {
                    "package_name": "com.fitrack.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDummyKeyForBuildOnly"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "status": 1
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          else
            echo "[CI] Using workspace android/app/google-services.json"
          fi

      - name: Setup Release Keystore
        run: |
          KEYSTORE_BASE64="${{ secrets.ANDROID_KEYSTORE_BASE64 || secrets.FITRACK_RELEASE_KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "[CI] Decoding release keystore secret to android/app/release.keystore..."
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          else
            echo "[CI] No release keystore secret found. Build will fallback to debug signing."
          fi

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          FITRACK_RELEASE_KEYSTORE: ${{ github.workspace }}/android/app/release.keystore
          FITRACK_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || secrets.FITRACK_RELEASE_STORE_PASSWORD }}
          FITRACK_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || secrets.FITRACK_RELEASE_KEY_ALIAS }}
          FITRACK_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.FITRACK_RELEASE_KEY_PASSWORD }}
          EXPO_PUBLIC_STORAGE_ENCRYPTION_KEY: ${{ secrets.EXPO_PUBLIC_STORAGE_ENCRYPTION_KEY || '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef' }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://jddzmsjnwomhppevocml.supabase.co' }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || 'dummy_anon_key' }}
          EXPO_PUBLIC_FIREBASE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_WEB_CLIENT_ID || '' }}

      - name: Upload Signed Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitrack-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
